name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan on Mondays at 02:00 UTC
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write  # Required for SARIF upload to GitHub Security tab
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # SAST: Semgrep
  # ─────────────────────────────────────────────────────────────────────────────
  sast-semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # actions/setup-python@v5.3.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'

      - name: Run Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/nodejs \
            --config p/typescript \
            --sarif \
            --output semgrep.sarif \
            --quiet || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # github/codeql-action/upload-sarif@v4
      - uses: github/codeql-action/upload-sarif@603b797f8b14b413fe025cd935a91c16c4782713
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # actions/upload-artifact@v4.4.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: semgrep-${{ github.run_id }}
          path: semgrep.sarif
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # SAST: CodeQL
  # ─────────────────────────────────────────────────────────────────────────────
  sast-codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # github/codeql-action/init@v4
      - uses: github/codeql-action/init@603b797f8b14b413fe025cd935a91c16c4782713
        with:
          languages: javascript, typescript
          queries: security-and-quality

      # github/codeql-action/autobuild@v4
      - uses: github/codeql-action/autobuild@603b797f8b14b413fe025cd935a91c16c4782713

      # github/codeql-action/analyze@v4
      - uses: github/codeql-action/analyze@603b797f8b14b413fe025cd935a91c16c4782713
        with:
          category: codeql
          output: security-reports/codeql.sarif

      # actions/upload-artifact@v4.4.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: codeql-${{ github.run_id }}
          path: security-reports/codeql.sarif
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # SAST: eslint-plugin-security
  # ─────────────────────────────────────────────────────────────────────────────
  sast-eslint:
    name: SAST — eslint-plugin-security
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc

      - name: Enable corepack
        run: corepack enable && corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eslint-plugin-security
        run: |
          mkdir -p security-reports
          # Scope to Nuklius-owned paths only. Trilium upstream code is not our gate.
          # Expand this glob as new Nuklius code is added (apps/*/src/nuklius, etc.)
          pnpm eslint \
            --plugin security \
            --rule 'security/detect-object-injection: error' \
            --rule 'security/detect-non-literal-regexp: error' \
            --rule 'security/detect-non-literal-require: error' \
            --rule 'security/detect-possible-timing-attacks: error' \
            --rule 'security/detect-unsafe-regex: error' \
            --format json \
            --output-file security-reports/eslint-security.json \
            "packages/ckeditor5/src/plugins/nuklius/**/*.ts" \
            "apps/server/src/nuklius/**/*.ts" \
            "apps/client/src/nuklius/**/*.ts" || true
          # Exit nonzero if any errors found
          if jq -e '.[].messages | map(select(.severity == 2)) | length > 0' security-reports/eslint-security.json > /dev/null 2>&1; then
            echo "ERROR: eslint-plugin-security found error-level violations"
            jq '.[].messages | map(select(.severity == 2))' security-reports/eslint-security.json
            exit 1
          fi

      # actions/upload-artifact@v4.4.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: eslint-security-${{ github.run_id }}
          path: security-reports/eslint-security.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Dependency: pnpm audit + OSV-Scanner
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (pnpm + OSV)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc

      - name: Enable corepack
        run: corepack enable && corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: |
          mkdir -p security-reports
          # --prod: production deps only. Dev-tool vulns (happy-dom, playwright, etc.)
          # inherited from Trilium upstream are not a production gate concern.
          # TODO Sprint 2/3: audit and fix inherited production-level vulns (multer, axios, form-data).
          pnpm audit --prod --json > security-reports/pnpm-audit.json || true
          # Gate: fail on Critical in production deps only.
          # High inherited from Trilium deps (tar, minimatch, preact transitives) are
          # reported but not blocking. TODO Sprint 2/3: fix inherited high-severity prod vulns.
          if jq -e '.metadata.vulnerabilities.critical > 0' security-reports/pnpm-audit.json > /dev/null 2>&1; then
            echo "ERROR: pnpm audit found Critical vulnerabilities in production deps"
            jq '.metadata.vulnerabilities' security-reports/pnpm-audit.json
            exit 1
          fi
          # Log high count for visibility without blocking
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' security-reports/pnpm-audit.json 2>/dev/null || echo 0)
          if [ "${HIGH}" -gt 0 ]; then
            echo "WARN: pnpm audit found ${HIGH} High vulnerabilities in production deps (inherited Trilium — see TODO)"
          fi

      # google/osv-scanner-action/osv-scanner-action@v1.8.2
      - uses: google/osv-scanner-action/osv-scanner-action@7ac94f9d40028db4cacf8d53adec6626f5d3d2f7
        with:
          scan-args: |-
            --output=security-reports/osv.json
            --format=json
            ./
        continue-on-error: true

      - name: Check OSV results
        run: |
          # OSV-Scanner scans all deps (no --prod filter). pnpm audit --prod is the blocking gate.
          # This step is report-only: logs counts for visibility, never exits non-zero.
          # TODO Sprint 2/3: fix inherited Trilium critical/high vulns and tighten this gate.
          if [ -f security-reports/osv.json ]; then
            CRITICAL=$(jq '[.results[].packages[].vulnerabilities[] | select(.database_specific.severity == "CRITICAL")] | length' security-reports/osv.json 2>/dev/null || echo 0)
            HIGH=$(jq '[.results[].packages[].vulnerabilities[] | select(.database_specific.severity == "HIGH")] | length' security-reports/osv.json 2>/dev/null || echo 0)
            echo "OSV-Scanner (all deps, incl. dev): Critical=${CRITICAL} High=${HIGH}"
            if [ "${CRITICAL}" -gt 0 ] || [ "${HIGH}" -gt 0 ]; then
              echo "WARN: inherited Trilium vulnerabilities — see pnpm audit --prod for production gate"
            fi
          fi

      # actions/upload-artifact@v4.4.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: dependency-audit-${{ github.run_id }}
          path: |
            security-reports/pnpm-audit.json
            security-reports/osv.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # License Policy
  # ─────────────────────────────────────────────────────────────────────────────
  license-policy:
    name: License Policy (AGPL-compatible)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc

      - name: Enable corepack
        run: corepack enable && corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: pnpm run license-check

      # actions/upload-artifact@v4.4.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: license-policy-${{ github.run_id }}
          path: security-reports/licenses*.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Secrets: Gitleaks — Zero Tolerance
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (Gitleaks — zero tolerance)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0  # Full history required for git log scan

      # gitleaks/gitleaks-action@v2.3.4
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml

      # actions/upload-artifact@v4.4.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: gitleaks-${{ github.run_id }}
          path: results.sarif
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Container/FS Scan: Trivy
  # ─────────────────────────────────────────────────────────────────────────────
  container-fs-scan:
    name: Container/FS Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Create security-reports directory
        run: mkdir -p security-reports

      # aquasecurity/trivy-action@0.35.0
      # TODO Sprint 2/3: remove continue-on-error once inherited Trilium vulns are resolved.
      # Tracked: pnpm audit --prod shows production-level inherited vulns (multer, axios, form-data).
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: security-reports/trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
        continue-on-error: true  # Remove after inherited Trilium vulns resolved — see TODO above

      # github/codeql-action/upload-sarif@v4
      - uses: github/codeql-action/upload-sarif@603b797f8b14b413fe025cd935a91c16c4782713
        if: always()
        with:
          sarif_file: security-reports/trivy.sarif
          category: trivy

      # actions/upload-artifact@v4.4.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: trivy-${{ github.run_id }}
          path: security-reports/trivy.sarif
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # DAST: OWASP ZAP Baseline
  # ─────────────────────────────────────────────────────────────────────────────
  dast-zap:
    name: DAST — OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc

      - name: Enable corepack
        run: corepack enable && corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Trilium server (if present)
        run: |
          mkdir -p logs security-reports
          if [ -d apps/server ]; then
            TRILIUM_DATA_DIR=/tmp/nuklius-zap-$$ TRILIUM_PORT=8080 \
              pnpm --filter @trilium/server start &
            # Poll readiness
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080 -o /dev/null 2>/dev/null; then
                echo "Server ready after ${i}*2s"
                break
              fi
              sleep 2
            done
          else
            echo "WARN: apps/server not present — ZAP scan will target empty port (expected in Sprint 1)"
            # Start a minimal stub so ZAP has something to scan
            python3 -m http.server 8080 --directory . &
            sleep 2
          fi

      # TODO Sprint 1: continue-on-error=true because Trilium server is not yet present
      # in this repo. MUST be changed to continue-on-error: false once the Trilium fork
      # is merged (Sprint 1 runbook Step 0) and the server passes the launch smoke test.
      # Tracked in docs/SPRINT-01.md acceptance tests.
      - name: ZAP baseline scan — server root
        # zaproxy/action-baseline@v0.15.0
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.conf'
          cmd_options: '-j'
          issue_title: 'ZAP Baseline - Server Root'
        continue-on-error: true  # Remove after Trilium fork merge — see TODO above

      - name: ZAP baseline scan — ETAPI routes
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          target: 'http://localhost:8080/etapi/'
          rules_file_name: '.zap/rules.conf'
          cmd_options: '-j'
          issue_title: 'ZAP Baseline - ETAPI'
        continue-on-error: true  # Remove after Trilium fork merge — see TODO above

      # actions/upload-artifact@v4.4.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: zap-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
            zap-baseline-results*.json
          retention-days: 90
