# ZAP Baseline Scan Rules Configuration
# Format: RULE_ID ACTION [PARAMETER]
# Actions: IGNORE, WARN, FAIL, INFO
# See: https://www.zaproxy.org/docs/docker/baseline-scan/

# Informational alerts — do not fail CI on these
10015	IGNORE	# Incomplete or No Cache-control Header (expected for dev mode)
10094	IGNORE	# Base64 Disclosure (false positive on Trilium encoded content)
90022	IGNORE	# Application Error Disclosure (Trilium dev mode stack traces)

# Known Trilium baseline behaviors — warn but do not fail
10202	WARN	# Absence of Anti-CSRF Tokens (Trilium uses ETAPI token auth)
10017	WARN	# Cross-Domain JavaScript Source File Inclusion

# Fail on these if found in ETAPI or nuklius routes
40012	FAIL	# Cross Site Scripting (Reflected)
40014	FAIL	# Cross Site Scripting (Persistent)
40018	FAIL	# SQL Injection
40019	FAIL	# SQL Injection - MySQL
90019	FAIL	# Server Side Code Injection
